# Release on a vX.Y.Z tag: build TakeShot.app, zip it, create a GitHub Release.
#
# Ad-hoc signing (no Developer ID), so on first launch of a downloaded build
# macOS shows a Gatekeeper warning — open via right-click → Open, or:
# xattr -d com.apple.quarantine TakeShot.app
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: ./scripts/test.sh

      - name: Build TakeShot.app
        run: ./scripts/bundle-app.sh

      - name: App DMG
        run: |
          mkdir -p build/dmg-root
          cp -R build/TakeShot.app build/dmg-root/
          ln -s /Applications build/dmg-root/Applications
          hdiutil create -volname "TakeShot" -srcfolder build/dmg-root \
            -ov -format UDZO "build/TakeShot-${{ github.ref_name }}.dmg"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "TakeShot ${{ github.ref_name }}" \
            --generate-notes \
            "build/TakeShot-${{ github.ref_name }}.dmg"
