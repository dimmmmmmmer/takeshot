# Build and test on every push/PR. The DeckLink SDK is not in the repo,
# so the bridge builds in stub mode — this doesn't affect the core or GUI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          sw_vers
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: ./scripts/test.sh

      - name: Build TakeShot.app
        run: ./scripts/bundle-app.sh

      - name: Zip the app
        run: ditto -c -k --keepParent build/TakeShot.app build/TakeShot.zip

      - name: Build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TakeShot-${{ github.sha }}
          path: build/TakeShot.zip
          retention-days: 14
